<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AGB Supervisor</title>
  <base href="/" />
  <meta name="color-scheme" content="light" />
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-tap-highlight" content="no" />
  <meta name="description" content="AGB Supervisor Mobile App - Annai Golden Builders" />
  <meta name="theme-color" content="#FFFFFF" />
  <link rel="icon" type="image/png" href="assets/icon/favicon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AGB Supervisor" />

  <!-- Premium Splash Screen Styles -->
  <style>
    .splash-screen {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #FFFFFF;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    .splash-screen.fade-out {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .splash-logo {
      width: 180px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .splash-logo-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .splash-brand { text-align: center; }
    .splash-brand-name {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #111827;
      letter-spacing: 0.3px;
      margin: 0 0 2px;
    }
    .splash-brand-sub {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    .splash-loader {
      width: 28px;
      height: 28px;
      position: relative;
    }
    .splash-loader-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2.5px solid #e5e7eb;
      border-top-color: #2563eb;
      animation: splash-spin 0.8s linear infinite;
    }
    @keyframes splash-spin {
      to { transform: rotate(360deg); }
    }
 </style>
</head>
<body>
  <!-- Premium branded splash screen -->
  <div class="splash-screen" id="splash-screen">
    <div class="splash-logo">
      <img
        src="assets/logo.jpg"
        alt="Annai Golden Builders"
        class="splash-logo-img"
      />
   </div>
    <div class="splash-brand">
      <div class="splash-brand-name">Annai Golden Builders</div>
      <div class="splash-brand-sub">Supervisor Portal</div>
    </div>
    <div class="splash-loader">
      <div class="splash-loader-ring"></div>
    </div>
  </div>

  <app-root></app-root>

  <script>
    // Splash is hidden by Angular after all init work completes.
    // Safety fallback: if Angular fails to bootstrap entirely, remove splash after 10s.
    document.addEventListener('DOMContentLoaded', function() {
      var splash = document.getElementById('splash-screen');
      setTimeout(function() {
        if (splash && !splash.classList.contains('fade-out')) {
          splash.classList.add('fade-out');
          setTimeout(function() { if (splash) splash.remove(); }, 600);
        }
      }, 10000);
    });
  </script>
</body>
</html>
