<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AGB Supervisor</title>
  <base href="/" />
  <meta name="color-scheme" content="light" />
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-tap-highlight" content="no" />
  <meta name="description" content="AGB Supervisor Mobile App - Annai Golden Builders" />
  <meta name="theme-color" content="#002263" />
  <link rel="icon" type="image/png" href="assets/icon/favicon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AGB Supervisor" />

  <!-- Premium Splash Screen Styles -->
  <style>
    .splash-screen {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: linear-gradient(145deg, #002263 0%, #003380 50%, #001a4d 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    .splash-screen.fade-out {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .splash-logo {
      width: 88px;
      height: 88px;
      animation: splash-pulse 2s ease-in-out infinite;
    }
    .splash-logo svg {
      width: 100%;
      height: 100%;
    }
    .splash-brand {
      text-align: center;
    }
    .splash-brand-name {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: 0.5px;
      margin: 0 0 4px;
    }
    .splash-brand-sub {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: rgba(201, 162, 39, 0.9);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .splash-loader {
      width: 40px;
      height: 40px;
      position: relative;
    }
    .splash-loader-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #c9a227;
      animation: splash-spin 1s linear infinite;
    }
    @keyframes splash-pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.04); opacity: 0.9; }
    }
    @keyframes splash-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Premium branded splash screen -->
  <div class="splash-screen" id="splash-screen">
    <div class="splash-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="28" stroke="#c9a227" stroke-width="2" fill="none"/>
        <circle cx="32" cy="32" r="22" stroke="#c9a227" stroke-width="1" opacity="0.35"/>
        <path d="M24 42 Q32 16 40 42 Z" stroke="#c9a227" stroke-width="1.8" fill="none"/>
        <path d="M20 42 Q32 20 44 42 Z" stroke="#c9a227" stroke-width="1.3" opacity="0.55" fill="none"/>
        <path d="M16 42 Q32 24 48 42 Z" stroke="#c9a227" stroke-width="0.9" opacity="0.3" fill="none"/>
        <rect x="22" y="42" width="20" height="5" rx="2" fill="#c9a227"/>
        <rect x="25" y="47" width="14" height="3.5" rx="1.75" fill="#c9a227" opacity="0.65"/>
        <line x1="32" y1="14" x2="32" y2="6" stroke="#c9a227" stroke-width="1.5"/>
        <circle cx="32" cy="5" r="2.2" fill="#c9a227"/>
        <rect x="16" y="28" width="3" height="14" rx="1" fill="#c9a227" opacity="0.45"/>
        <rect x="45" y="28" width="3" height="14" rx="1" fill="#c9a227" opacity="0.45"/>
      </svg>
    </div>
    <div class="splash-brand">
      <div class="splash-brand-name">Annai Golden Builders</div>
      <div class="splash-brand-sub">Supervisor Portal</div>
    </div>
    <div class="splash-loader">
      <div class="splash-loader-ring"></div>
    </div>
  </div>

  <app-root></app-root>

  <script>
    // Hide splash screen once Angular has bootstrapped
    document.addEventListener('DOMContentLoaded', function() {
      var splash = document.getElementById('splash-screen');
      // If Angular hasn't hidden it by 3s, force hide
      setTimeout(function() {
        if (splash && !splash.classList.contains('fade-out')) {
          splash.classList.add('fade-out');
          setTimeout(function() { if (splash) splash.remove(); }, 600);
        }
      }, 3000);
    });
  </script>
</body>
</html>
