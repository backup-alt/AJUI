<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#ba0013" />
    <title>Annai Jewellers</title>
    <link rel="preconnect" href="https://cdn.tailwindcss.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://lh3.googleusercontent.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
      rel="stylesheet"
    />
    <link rel="preload" href="/assets/annai-logo-mark.png" as="image" />
    <link rel="preload" href="/assets/annai-wordmark.jpg" as="image" />
    <link
      rel="prefetch"
      href="/screens/shop_jewellery_updated_header/code.html"
      as="document"
    />
    <link
      rel="prefetch"
      href="/screens/scheme_categories/code.html"
      as="document"
    />
    <link
      rel="prefetch"
      href="/screens/scheme_details_multi_scheme_carousel/code.html"
      as="document"
    />
    <link
      rel="prefetch"
      href="/screens/annai_news_feed_updated_header/code.html"
      as="document"
    />
    <link
      rel="prefetch"
      href="/screens/payments_updated_nav/code.html"
      as="document"
    />
    <link
      rel="prefetch"
      href="/screens/profile_updated_nav/code.html"
      as="document"
    />
    <link
      rel="prefetch"
      href="/screens/join_scheme_personalized_refined/code.html"
      as="document"
    />
    <link rel="stylesheet" href="/ionic/ionic.bundle.css" />
    <script type="module" src="/ionic/ionic.esm.js"></script>
  </head>
  <body>
    <ion-app>
      <main class="app-shell" aria-label="Annai Jewellers mobile app">
        <div id="screen-stack" class="screen-stack">
          <iframe
            id="screen-frame"
            class="screen-frame is-active"
            title="Annai Jewellers"
            src="about:blank"
            loading="eager"
            data-route="home"
          ></iframe>
        </div>

        <nav id="app-nav" class="universal-nav" aria-label="Primary">
          <button class="app-nav-button" type="button" data-route="home" aria-label="Home">
            <span class="material-symbols-outlined" aria-hidden="true">home</span>
            <span>Home</span>
          </button>
          <button class="app-nav-button" type="button" data-route="shop" aria-label="Shop">
            <span class="material-symbols-outlined" aria-hidden="true">shopping_bag</span>
            <span>Shop</span>
          </button>
          <button class="app-nav-button" type="button" data-route="schemeCategories" aria-label="Schemes">
            <span class="material-symbols-outlined" aria-hidden="true">savings</span>
            <span>Schemes</span>
          </button>
          <button class="app-nav-button" type="button" data-route="news" aria-label="News">
            <span class="material-symbols-outlined" aria-hidden="true">newspaper</span>
            <span>News</span>
          </button>
          <button class="app-nav-button" type="button" data-route="payments" aria-label="Payments">
            <span class="material-symbols-outlined" aria-hidden="true">receipt_long</span>
            <span>Payments</span>
          </button>
        </nav>

        <div id="splash-screen" class="splash-screen" aria-hidden="true">
          <div class="splash-glow"></div>
          <div class="splash-content">
            <div class="splash-brand-card">
              <div class="splash-emblem" aria-hidden="true">
                <img
                  class="splash-logo-mark"
                  src="/assets/annai-logo-mark.png"
                  alt=""
                />
              </div>
              <img
                class="splash-wordmark-image"
                src="/assets/annai-wordmark.jpg"
                alt="Annai Jewellers"
              />
              <div class="splash-tagline">Pure Gold As Mothers Love</div>
            </div>
            <div class="splash-loader" aria-hidden="true"><span></span></div>
          </div>
        </div>

        <div
          id="qr-modal"
          class="qr-modal"
          role="dialog"
          aria-modal="true"
          aria-labelledby="qr-title"
          hidden
        >
          <div class="qr-backdrop" data-close-qr></div>
          <section class="qr-sheet">
            <button class="qr-close" type="button" aria-label="Close" data-close-qr>
              <span aria-hidden="true">&times;</span>
            </button>
            <h2 id="qr-title">Annai Jewellers</h2>
            <p>John Doe</p>
            <canvas id="qr-canvas" width="220" height="220"></canvas>
            <small>AJ-2026-0001</small>
          </section>
        </div>
      </main>
    </ion-app>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
