<style>@keyframes shimmer { 100% { transform: translateX(100%); } }</style></head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col">
<!-- TopAppBar -->
<!-- Main Content Canvas (Error State) -->
<main class="flex-grow flex flex-col items-center justify-center px-container-padding py-24 text-center bg-background min-h-screen">
<div class="max-w-md w-full animate-pulse-slow">
<!-- Stylized Connection Lost / Lotus Mark Hybrid Icon -->
<div class="relative inline-block mb-8">
<div class="absolute inset-0 bg-primary opacity-10 rounded-full blur-3xl scale-[2] animate-pulse"></div>
<div class="relative flex flex-col items-center">
<span class="material-symbols-outlined text-primary" style="font-size: 80px; font-variation-settings: &quot;wght&quot; 200;">signal_disconnected</span>
<div class="absolute -bottom-2 -right-2 bg-background p-1 rounded-full">
<span class="material-symbols-outlined text-error" style="font-size: 32px; font-variation-settings: &quot;FILL&quot; 1;">error</span>
</div>
</div>
</div>
<!-- Error Messaging -->
<h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-4">
                Connection Interrupted
            </h2>
<p class="font-body-md text-body-md text-tertiary mb-10 max-w-xs mx-auto">
                We are having trouble reaching our servers. Please check your internet connection and try again.
            </p>
<!-- Action Button -->
<button class="w-full h-touch-target-min bg-primary text-on-primary font-label-lg text-label-lg rounded-lg shadow-sm active:scale-95 transition-transform duration-200 flex items-center justify-center gap-2 group relative overflow-hidden before:absolute before:inset-0 before:-translate-x-full before:animate-[shimmer_2s_infinite] before:bg-gradient-to-r before:from-transparent before:via-white/20 before:to-transparent" id="retryButton">
<span class="material-symbols-outlined group-hover:rotate-180 transition-transform duration-500">refresh</span>
                RETRY
            </button>
<!-- Secondary Help Action -->

</div>
</main>
<!-- BottomNavBar -->
<script>
        document.getElementById('retryButton').addEventListener('click', function() {
            const btn = this;
            const originalText = btn.innerHTML;
            
            // Interaction feedback
            btn.disabled = true;
            btn.innerHTML = `
                <span class="material-symbols-outlined animate-spin">refresh</span>
                RECONNECTING...
            `;
            
            // Simulate a brief check
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
                // Add a small toast or vibration feedback logic here if needed
            }, 2000);
        });
    </script>
