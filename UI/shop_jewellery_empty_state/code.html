<body class="bg-surface font-body-md text-on-surface flex flex-col min-h-screen">
<!-- TopAppBar -->

<div class="max-w-[400px] w-full text-center flex flex-col items-center gap-stack-gap">

<div class="relative w-48 h-48 mb-4">
<div class="absolute inset-0 bg-surface-container rounded-full opacity-50 animate-pulse"></div>
<div class="relative flex items-center justify-center w-full h-full">
<span class="material-symbols-outlined text-[120px] text-tertiary-fixed-dim" style="font-variation-settings: &quot;wght&quot; 200;">inventory_2</span>
<!-- Decorative Lotus Motif Overlay -->
<div class="absolute -bottom-2 -right-2 bg-surface-container-high rounded-full p-3 border border-outline-variant">
<span class="material-symbols-outlined text-primary opacity-40">filter_vintage</span>
</div>
</div>
</div>
<!-- Empty State Messaging -->
<div class="space-y-3">
<h2 class="text-headline-lg-mobile font-headline-lg-mobile text-on-surface">Collections coming soon</h2>
<p class="text-body-md font-body-md text-on-surface-variant leading-relaxed">
                    Our master craftsmen are currently curating a new collection of heritage jewellery. Sign up to be the first to view our exclusive arrivals.
                </p>
</div>
<!-- Action Button -->
<button class="w-full h-touch-target-min bg-primary text-on-primary font-label-lg text-label-lg rounded-xl flex items-center justify-center gap-2 transition-all hover:brightness-110 active:scale-95 shadow-lg shadow-primary/10">
<span class="material-symbols-outlined">notifications</span>
                Notify Me
            </button>
<button class="text-primary font-label-lg text-label-lg px-4 py-2 hover:bg-surface-container rounded-lg transition-colors">
                View Gold Rates
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 right-0 flex justify-around items-center px-2 pb-safe h-[80px] bg-surface border-t border-outline-variant z-50">
<!-- Home -->
<a class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-surface-container-high rounded-xl transition-colors" href="#">

<span class="text-label-lg font-label-lg-mobile">Home</span>
</a>
<!-- Shop (Active) -->
<a class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-xl px-4 py-1.5 transition-colors active-nav-interaction" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: &quot;FILL&quot; 1;">shopping_bag</span>
<span class="text-label-lg font-label-lg-mobile">Shop</span>
</a>
<!-- Schemes -->
<a class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-surface-container-high rounded-xl transition-colors" href="#">
<span class="material-symbols-outlined">savings</span>
<span class="text-label-lg font-label-lg-mobile">Schemes</span>
</a>
<!-- News -->
<a class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-surface-container-high rounded-xl transition-colors" href="#">
<span class="material-symbols-outlined">newspaper</span>
<span class="text-label-lg font-label-lg-mobile">News</span>
</a>
<!-- Profile -->
<a class="flex flex-col items-center justify-center text-on-surface-variant p-2 hover:bg-surface-container-high rounded-xl transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-label-lg font-label-lg-mobile">Profile</span>
</a>
</nav>
<script>
        // Simple micro-interaction for Notify Me button
        const notifyBtn = document.querySelector('button.bg-primary');
        notifyBtn.addEventListener('click', () => {
            const originalContent = notifyBtn.innerHTML;
            notifyBtn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span> Subscribing...`;
            notifyBtn.disabled = true;
            notifyBtn.classList.add('opacity-80');

            setTimeout(() => {
                notifyBtn.innerHTML = `<span class="material-symbols-outlined">check_circle</span> You're on the list!`;
                notifyBtn.classList.remove('bg-primary');
                notifyBtn.classList.add('bg-secondary', 'text-on-secondary');
                
                // Reset after 3 seconds
                setTimeout(() => {
                    notifyBtn.innerHTML = originalContent;
                    notifyBtn.classList.add('bg-primary');
                    notifyBtn.classList.remove('bg-secondary', 'text-on-secondary', 'opacity-80');
                    notifyBtn.disabled = false;
                }, 3000);
            }, 1200);
        });

        // Handle navigation active states (visual only for this demo)
        const navItems = document.querySelectorAll('nav a');
        navItems.forEach(item => {
            item.addEventListener('click', (e) => {
                // Remove active classes from all
                navItems.forEach(nav => {
                    nav.classList.remove('bg-secondary-container', 'text-on-secondary-container');
                    nav.classList.add('text-on-surface-variant');
                    const icon = nav.querySelector('.material-symbols-outlined');
                    if(icon) icon.style.fontVariationSettings = "'FILL' 0";
                });
                
                // Add to clicked
                item.classList.add('bg-secondary-container', 'text-on-secondary-container');
                item.classList.remove('text-on-surface-variant');
                const icon = item.querySelector('.material-symbols-outlined');
                if(icon) icon.style.fontVariationSettings = "'FILL' 1";
            });
        });
    </script>
