            image: 'https://lh3.googleusercontent.com/aida-public/AB6AXuDVMLn9mbwSDXP1d3ZyvR52mh9eGgf9JDw4oXCm92_7_6B4FXY8eB0dl7jWlfxqdcHzPA9PtKoOCwHTp5HOU-gFW34atD6Oiqlx9GiKgjAcYRKv_tfUAF5f0zOAPHvTPHvBZs2Sp8I63Eq8KkyDdvUQ0z_mVxzPUP8bCPE8mkZE9nPGxnWBKihHF_7fzCQuBMZGtZa1um0qQSqqt3ZuhtJfzmHriM-vmt9YDDck1kjLejzD_tl8Rxt6j-zlJpgSjTWNm4aFM07PUXg'
        },
        {
            name: 'Diamond Stud Earrings',
            category: 'diamond',
            type: 'Earrings',
            weight: '8g',
            price: 'Rs. 1,20,000',
            image: 'https://lh3.googleusercontent.com/aida-public/AB6AXuDVMLn9mbwSDXP1d3ZyvR52mh9eGgf9JDw4oXCm92_7_6B4FXY8eB0dl7jWlfxqdcHzPA9PtKoOCwHTp5HOU-gFW34atD6Oiqlx9GiKgjAcYRKv_tfUAF5f0zOAPHvTPHvBZs2Sp8I63Eq8KkyDdvUQ0z_mVxzPUP8bCPE8mkZE9nPGxnWBKihHF_7fzCQuBMZGtZa1um0qQSqqt3ZuhtJfzmHriM-vmt9YDDck1kjLejzD_tl8Rxt6j-zlJpgSjTWNm4aFM07PUXg'
        },
        {
            name: 'Diamond Pendant Chain',
            category: 'diamond',
            type: 'Pendant',
            weight: '10g',
            price: 'Rs. 1,65,000',
            image: 'https://lh3.googleusercontent.com/aida-public/AB6AXuDVMLn9mbwSDXP1d3ZyvR52mh9eGgf9JDw4oXCm92_7_6B4FXY8eB0dl7jWlfxqdcHzPA9PtKoOCwHTp5HOU-gFW34atD6Oiqlx9GiKgjAcYRKv_tfUAF5f0zOAPHvTPHvBZs2Sp8I63Eq8KkyDdvUQ0z_mVxzPUP8bCPE8mkZE9nPGxnWBKihHF_7fzCQuBMZGtZa1um0qQSqqt3ZuhtJfzmHriM-vmt9YDDck1kjLejzD_tl8Rxt6j-zlJpgSjTWNm4aFM07PUXg'
        },
        {
            name: 'Silver Pooja Bowl',
            category: 'silver',
            type: 'Silverware',
            weight: '45g',
            price: 'Rs. 8,500',
            image: 'https://lh3.googleusercontent.com/aida-public/AB6AXuBWbvNgZtOgTEsKI6PEhYzw3rj8dKj7hY4X0xCAxikBtSi9yJAPOnFfhyl25jrXaRCcllx1Y77W6q_ENNZDcRFxzBH5R_mcTgCF76D5n_kZB8A73prCOS1tfhoLbq9tBuelwB5L4b5--jYJJlnFzo2WoMfOp1oWUnQ62pdge5chIEoKLxvTeCC0BQwpVlDTV83YBeJd8EC6RDIAfT_SyX0UDty2vIdzzt2MLEQPEUEPptErkYXwdW6SC_Vz0ZcRj8adlRV5Aj2nBrE'
        }
    ];

    const main = document.querySelector('main');
    const categoryBar = main.querySelector('.no-scrollbar');
    const productGrid = main.querySelector('.grid');
    let activeFilter = 'all';

    categoryBar.insertAdjacentHTML('beforebegin', `
        <section class="bg-surface-container-lowest border border-outline-variant rounded-xl p-4 mb-4 shadow-sm animate-slide-up-fade">
            <label class="relative block">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
                <input id="jewellerySearch" class="w-full h-touch-target-min rounded-xl border border-outline-variant bg-surface pl-11 pr-4 text-body-md text-on-surface placeholder:text-on-surface-variant focus:border-primary focus:ring-primary" type="search" placeholder="Search jewellery items">
            </label>
            <div class="flex items-center justify-between mt-3">
                <span id="shopResultCount" class="text-label-sm font-label-sm text-on-surface-variant"></span>
                <button id="clearShopSearch" type="button" class="text-label-sm font-label-sm text-primary">Clear</button>
            </div>
        </section>
    `);

    categoryBar.insertAdjacentHTML('afterbegin', `
        <button type="button" data-filter="all" class="flex flex-col items-center justify-center min-w-[80px] text-primary animate-slide-up-fade transition-transform duration-200 active:scale-95 hover:scale-105">
            <div class="w-14 h-14 rounded-full bg-primary-container/10 flex items-center justify-center mb-1 border-2 border-primary transition-all duration-300">
                <span class="material-symbols-outlined text-3xl">apps</span>
            </div>
            <span class="text-label-sm font-label-sm transition-colors duration-200">All</span>
        </button>
    `);

    const addedMarkup = addedJewellery.map((item, index) => `
        <article data-added="true" data-category="${item.category}" data-search="${item.name.toLowerCase()} ${item.category} ${item.type.toLowerCase()}" class="bg-surface rounded-xl border border-outline-variant overflow-hidden flex flex-col transition-all duration-200 hover:shadow-lg hover:-translate-y-1 active:scale-[0.98] active:shadow-md animate-slide-up-fade cursor-pointer text-left" style="animation-delay: ${index * 60}ms">
            <div class="aspect-square bg-surface-container-lowest w-full relative overflow-hidden">
                <img alt="${item.name}" class="w-full h-full object-cover transition-transform duration-500 hover:scale-105" src="${item.image}">
            </div>
            <div class="p-4 flex flex-col flex-1">
                <div class="flex items-start justify-between gap-2 mb-1">
                    <h2 class="text-label-lg font-label-lg text-on-surface line-clamp-2">${item.name}</h2>
                    <span class="text-[10px] uppercase rounded-full bg-primary-container/10 text-primary px-2 py-1">${item.category}</span>
                </div>
                <p class="text-label-sm font-label-sm text-on-surface-variant mb-3">${item.type}</p>
                <div class="flex justify-between items-end mt-auto mb-4">
                    <span class="text-body-md font-body-md text-on-surface-variant">${item.weight}</span>
                    <span class="text-headline-md font-headline-md text-on-surface">${item.price}</span>
                </div>
                <button class="w-full h-touch-target-min bg-primary text-on-primary rounded-lg text-label-lg font-label-lg flex items-center justify-center transition-all duration-200 hover:bg-on-primary-fixed-variant active:scale-95 shadow-sm hover:shadow">Buy Now</button>
            </div>
        </article>
    `).join('');

    productGrid.insertAdjacentHTML('beforeend', addedMarkup);
    productGrid.insertAdjacentHTML('afterend', '<div id="shopNoResults" class="hidden rounded-xl border border-outline-variant bg-surface-container-lowest p-6 text-center text-on-surface-variant">No jewellery items match your search.</div>');

    const searchInput = document.getElementById('jewellerySearch');
    const clearSearch = document.getElementById('clearShopSearch');
    const resultCount = document.getElementById('shopResultCount');
    const noResults = document.getElementById('shopNoResults');
    const filterButtons = Array.from(categoryBar.querySelectorAll('button'));

    function categoryForTitle(title) {
        const value = title.toLowerCase();
        if (value.includes('diamond')) return 'diamond';
        if (value.includes('silver')) return 'silver';
        return 'gold';
    }

    function hydrateExistingCards() {
        Array.from(productGrid.querySelectorAll('article:not([data-added])')).forEach(article => {
            const title = article.querySelector('h2')?.textContent.trim() || '';
            const category = categoryForTitle(title);
            article.dataset.category = category;
            article.dataset.search = `${title.toLowerCase()} ${category}`;
            if (!article.querySelector('[data-category-pill]')) {
                article.querySelector('.p-4')?.insertAdjacentHTML('afterbegin', `<span data-category-pill class="self-start mb-2 text-[10px] uppercase rounded-full bg-primary-container/10 text-primary px-2 py-1">${category}</span>`);
            }
        });
    }

    function setFilterButtonState() {
        filterButtons.forEach(button => {
            const filter = button.dataset.filter || button.textContent.trim().toLowerCase();
            button.dataset.filter = filter;
            const active = filter === activeFilter;
            button.classList.toggle('text-primary', active);
            button.classList.toggle('text-on-surface-variant', !active);
            const iconWrap = button.querySelector('div');
            if (iconWrap) {
                iconWrap.classList.toggle('border-2', active);
                iconWrap.classList.toggle('border-primary', active);
                iconWrap.classList.toggle('bg-primary-container/10', active);
                iconWrap.classList.toggle('bg-surface-container', !active);
            }
        });
    }

    function applyShopFilters() {
        const query = searchInput.value.trim().toLowerCase();
        let visibleCount = 0;
        Array.from(productGrid.querySelectorAll('article')).forEach(article => {
            const matchesCategory = activeFilter === 'all' || article.dataset.category === activeFilter;
            const matchesSearch = !query || article.dataset.search.includes(query);
            const visible = matchesCategory && matchesSearch;
            article.classList.toggle('hidden', !visible);
            if (visible) visibleCount += 1;
        });
        resultCount.textContent = `${visibleCount} item${visibleCount === 1 ? '' : 's'} found`;
        noResults.classList.toggle('hidden', visibleCount !== 0);
        setFilterButtonState();
    }

    hydrateExistingCards();
    filterButtons.forEach(button => {
        button.type = 'button';
        button.dataset.filter = button.dataset.filter || button.textContent.trim().toLowerCase();
        button.addEventListener('click', () => {
            activeFilter = button.dataset.filter;
            applyShopFilters();
        });
    });
    searchInput.addEventListener('input', applyShopFilters);
    clearSearch.addEventListener('click', () => {
        searchInput.value = '';
        activeFilter = 'all';
        applyShopFilters();
        searchInput.focus();
    });
    applyShopFilters();
</script>
