<style>
@keyframes fade-down {
  0% { opacity: 0; transform: translateY(-20px); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes fade-up {
  0% { opacity: 0; transform: translateY(30px); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes shimmer {
  0% { transform: translateX(-150%) skewX(-15deg); }
  100% { transform: translateX(150%) skewX(-15deg); }
}

.animate-fade-down {
  animation: fade-down 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
.animate-fade-up {
  animation: fade-up 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.delay-100 { animation-delay: 100ms; }
.delay-200 { animation-delay: 200ms; }
.delay-300 { animation-delay: 300ms; }
.delay-400 { animation-delay: 400ms; }
.delay-500 { animation-delay: 500ms; }

.shimmer-effect::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 50%;
  height: 100%;
  background: linear-gradient(to right, transparent, rgba(255, 235, 150, 0.4), transparent);
  animation: shimmer 2.5s infinite;
  pointer-events: none;
}
</style>

<script>
        // Simple toggle logic for the segmented control
        document.addEventListener('DOMContentLoaded', () => {
            const toggles = document.querySelectorAll('[aria-pressed]');
            toggles.forEach(toggle => {
                toggle.addEventListener('click', (e) => {
                    toggles.forEach(t => {
                        t.setAttribute('aria-pressed', 'false');
                        t.classList.remove('bg-primary-container', 'text-on-primary-container', 'shadow-sm', 'shimmer-effect');
                        t.classList.add('text-on-surface-variant', 'hover:bg-surface-variant');
                    });
                    const target = e.currentTarget;
                    target.setAttribute('aria-pressed', 'true');
                    target.classList.remove('text-on-surface-variant', 'hover:bg-surface-variant');
                    target.classList.add('bg-primary-container', 'text-on-primary-container', 'shadow-sm', 'shimmer-effect');
                });
            });
        });
    </script>
