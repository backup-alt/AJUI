<script>
        // Micro-interaction for the CTA button
        document.querySelector('button').addEventListener('mousedown', function() {
            this.style.transform = 'scale(0.96)';
        });
        document.querySelector('button').addEventListener('mouseup', function() {
            this.style.transform = 'scale(1)';
        });
        
        // Simple entry animation for the card
        window.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.empty-state-card');
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            card.style.transition = 'all 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
            
            setTimeout(() => {
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
