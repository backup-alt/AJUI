<script>
        // Micro-interaction for the back button
        document.querySelector('header button:first-child').addEventListener('click', () => {
            console.log('Navigating back...');
        });

        // Atmospheric effect: gentle floating animation for the accents
        const accents = document.querySelectorAll('.max-w-\\[400px\\] div[class*="absolute"]:not(.inset-0)');
        accents.forEach((accent, index) => {
            accent.animate([
                { transform: 'translateY(0px)' },
                { transform: 'translateY(-10px)' },
                { transform: 'translateY(0px)' }
            ], {
                duration: 3000 + (index * 500),
                iterations: Infinity,
                easing: 'ease-in-out'
            });
        });
